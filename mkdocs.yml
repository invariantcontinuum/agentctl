site_name: agentctl
site_description: Docker-style control-plane CLI for AI agents, planning loops, tools, RAG, and memory.
repo_name: invariantcontinuum/agentctl
repo_url: https://github.com/invariantcontinuum/agentctl
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.action.edit
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: blue
    - scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to light mode

nav:
  - Introduction: index.md
  - Getting Started:
      - Install: install.md
      - Quickstart: quickstart.md
      - Configuration: configuration.md
  - Usage:
      - Current CLI: usage.md
      - Agentfile: agentfile.md
      - Models: models.md
  - Concepts:
      - Capability Taxonomy: concepts/taxonomy.md
      - Agentic Visibility: concepts/agentic-visibility.md
      - Architecture: concepts/architecture.md
      - Agent SDK: concepts/agent-sdk.md
  - Reference:
      - Implemented Commands: reference/commands.md
      - Target API: reference/target-api.md
      - AgentCompose: reference/agent-compose.md
  - Roadmap:
      - What Exists Now: roadmap/implemented.md
      - What Is Next: roadmap/todo.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - fenced_code
